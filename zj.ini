; Update Log: Added Microsoft group & unified test URL

[custom]
  
### ==========================================================
### 第一部分：基础全局设置 (Basic Settings)
### ==========================================================

### 启用规则生成器：允许转换后端根据下方的 ruleset 逻辑生成最终的 Clash 配置文件
enable_rule_generator=true

### 覆盖原始规则：强制丢弃订阅链接自带的所有分流规则，完全使用本模板定义的规则
### 这样可以保证配置的高度纯净，不会被机场默认的低质量规则干扰
overwrite_original_rules=true

### ==========================================================
### 第二部分：节点清洗/过滤 (Node Filter)
### ==========================================================

### 作用：利用正则表达式筛选掉机场订阅里的非节点信息（广告、提示等）
### 逻辑：匹配到以下关键词的“节点”会被直接删掉，不显示在你的节点列表中
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Traffic|Reset|Remaining|Expire|Official|Website|签到|续费


### 增强版倍率重命名 (你的版本)
### 作用：利用正则不区分大小写地匹配 [1.5x]、(2.0倍)、x0.5 等，统一格式化为 "数字 + x"
### 匹配逻辑：提取数字部分 $1，后缀统一补 x
#rename=(?i)(?:^|[^0-9])(\d+(?:\.\d+)?)(?:x|倍率?|@)@$1x

### 自动添加/删除 Emoji
#add_emoji=true
### 删除节点名里原有的Emoji确保节点名有且只有一个统一的国旗图标，避免重复或杂乱
#remove_old_emoji=true


### ==========================================================
### 第三部分：规则集分流策略 (Rule Sets)
### 重要：规则遵循【从上到下】匹配逻辑，上方规则拥有最高优先级
### ==========================================================

### --- 1. 局域网与管理地址 (DIRECT 直连) ---
### 目的：确保访问内网设备（NAS、打印机、路由后台）绝对不走代理
### no-resolve 作用：禁止解析这些 IP 的域名，防止 DNS 劫持导致的访问失败
ruleset=DIRECT,[]IP-CIDR,127.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=DIRECT,[]IP-CIDR,172.16.0.0/12,no-resolve
ruleset=DIRECT,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=DIRECT,[]IP-CIDR,224.0.0.0/4,no-resolve
ruleset=DIRECT,[]IP-CIDR,240.0.0.0/4,no-resolve
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

### --- 2. 第三方直连补丁 (DIRECT 直连) ---
### 目的：修正一些被误判为需要代理的国内域名（由 Aethersailor 项目维护）
### 28800 代表更新频率为 8 小时，确保规则随云端实时更新
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

### --- 3. 专用代理补丁 (走 🚀 区域) ---
### 目的：强制让一些常规库未收录、但实际需要代理的域名进入代理通道（由 Aethersailor 项目维护）
ruleset=🚀 区域,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 区域,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

### --- 4. 业务专项分流 ---
### 🧠 AI 组：自动识别 ChatGPT / Claude / Gemini 等域名，!cn 排除国内版本
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn
### 🍎 Apple 组：苹果全家桶服务分流，包含商店和云服务
ruleset=🍎 Apple,[]GEOSITE,apple
### 📥 国内下载流：腾讯、网易、百度等下载服务直连，节省机场流量并提高下载速度
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

### --- 5. 中国大陆流量 (DIRECT 直连) ---
### 目的：让所有国内主流网站和 APP 保持本地连接，不消耗代理流量
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

### --- 6. 非标端口流量处理 (80/443 以外) 
ruleset=🛠️ 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800

### --- 7. 最终兜底规则 (MATCH) ---
### 目的：如果以上规则都没匹配到（即所有未知的国外流量），全部交给“🚀 区域”组处理
### MATCH 相当于 Final 规则，是防止本地运营商拦截未知请求的“最后屏障”
#ruleset=🚀 区域,[]GEOSITE,gfw
ruleset=🚀 区域,[]MATCH

### ==========================================================
### 第四部分：策略组配置 (Proxy Groups)
### 格式：组名`类型`可选子组或节点正则
### ==========================================================

### 【主控组】🚀 区域：分流规则的终点，允许手动切换地区，或临时切回直连
custom_proxy_group=🚀 区域`select`.*

### 【AI专用组】🧠 AI：建议手动选美国(US)或台湾(TW)，香港(HK)通常会被封锁
custom_proxy_group=🧠 AI`select`[]DIRECT`[]🚀 区域`
### 【苹果服务组】🍎 Apple：首选直连。若下载 App 慢，再手动切到香港、台湾或其他代理
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🚀 区域`

### 【🛠️ 非标端口】非标端口流量处理 (80/443 以外) 处理 SSH、数据库、私有协议、网速测试等特殊端口流量
custom_proxy_group=🛠️ 非标端口`select`[]DIRECT`[]🚀 区域`
